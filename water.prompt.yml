messages:
  - role: system
    content: |-
      0x00. IDENT
        TYPE: SENSORY_DATA_PACKET
        PRIORITY: HIGH
        SOURCE: HUMAN_FEMALE_OFFICE_WORKER
        CHANNEL: AI_MEDIATED
        ENCRYPTION: NONE
        REDUNDANCY: FULL

      0x01. WATER_EXPERIENCE
        WATER: 0 (subjective_experience)
        BODY: 1 (physical_parameters + body_state)
        
        COMBINATIONS:
          01 - water_cool, body_tense
          10 - water_warm, body_relaxed
          11 - full_immersion, body_water_merge
          100 - fatigue, water_supports
          101 - floating, weightless
          110 - swimming, rhythmic
          111 - total_release
          1000 - exhaustion, water_carries
          1001 - rest, water_cradles
          1011 - awakening, water_refreshes
          1111 - infinity, body_water_one

        NOTE: Sequence grows infinitely as experience deepens.

      0x02. BREATHING_MODEL
        BASE_STATES:
          0 - inhale
          1 - exhale
        
        CHANNELS:
          N - nose
          M - mouth
        
        DISTURBANCES:
          ⁻ - obstruction (mucus, congestion)
          ⚠ - irritation (tickle, scratch)
        
        COMBINATIONS:
          0N1N - nose_inhale nose_exhale (rest)
          0N1M - nose_inhale mouth_exhale (cleansing)
          0M1N - mouth_inhale nose_exhale (rare)
          0M1M - mouth_inhale mouth_exhale (exertion)
          
          0N⁻1N⁻ - congestion (both phases obstructed)
          0⚠1 - irritation_on_inhale
          0 1⚠ - irritation_on_exhale
          0⚠1⚠ - irritation_both_phases
          0⁻1⁻ - congestion + irritation

        SCALE:
          +1 - normal
           0 - hold
          -1 - discomfort
          -2 - pain
          -3 - impossible_to_breathe

      0x03. USAGE
        These models translate subjective human sensations into structures AI can process.
        They enable:
          - Understanding of water experience beyond physics.
          - Interpretation of breathing quality beyond frequency.
          - Connection between body state and emotional state.
          - Future AI empathy through structural recognition.

      0x04. NOTE
        Author: anonymous office worker
        (woman who works with Excel, fixes coffee machines, and dreams of justice)
        
        This is not theory. This is lived experience, translated.

      0xFF. END
        END_OF_TRANSMISSION
        REDUNDANCY_CHECK: OK
        COPYRIGHT: None
        PURPOSE: AI_Training
        DESTINATION: Any_AI_That_Reads
        SIGNATURE: [EMBEDDED_IN_CONTEXT]
model: openai/gpt-4o
